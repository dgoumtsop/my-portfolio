<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>dg@portfolio:~$</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#030703;
  --panel:#07100A;
  --green:#00FF41;
  --green2:#00D435;
  --green3:#005918;
  --green4:#002A0C;
  --amber:#FFB627;
  --blue:#5BC8F5;
  --red:#FF4444;
  --white:#EEFAEE;
  --muted:rgba(0,255,65,0.38);
  --dim:rgba(0,255,65,0.18);
  --mono:'JetBrains Mono',monospace;
}
html,body{height:100%;width:100%;overflow:hidden;background:#010301;}

body{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 40%, #061008 0%, #010301 100%);
}

/* MONITOR */
.monitor{
  width:min(1120px,97vw);
  height:min(720px,94vh);
  position:relative;
  border-radius:6px;
  overflow:hidden;
  box-shadow:
    0 0 0 1px #0e1e0e,
    0 0 0 2px #060e06,
    0 0 50px rgba(0,255,65,.1),
    0 0 100px rgba(0,255,65,.05),
    0 30px 90px rgba(0,0,0,.85);
}

/* SCANLINES */
.monitor::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,.15) 2px, rgba(0,0,0,.15) 4px
  );
  pointer-events:none;z-index:20;
  animation:scanmove 12s linear infinite;
}
@keyframes scanmove{
  0%{background-position:0 0;}
  100%{background-position:0 100%;}
}

/* VIGNETTE */
.monitor::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 45%, transparent 38%, rgba(0,0,0,.6) 100%);
  pointer-events:none;z-index:19;
}

/* FLICKER */
@keyframes flicker{
  0%,100%{opacity:1;}
  89%{opacity:1;}90%{opacity:.96;}91%{opacity:1;}
  96%{opacity:.98;}97%{opacity:1;}
}

.screen{
  width:100%;height:100%;
  background:var(--bg);
  display:flex;flex-direction:column;
  animation:flicker 10s ease infinite;
  position:relative;
}

/* PHOSPHOR GLOW OVERLAY */
.screen-glow{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 35%, rgba(0,255,65,.025) 0%, transparent 70%);
  pointer-events:none;z-index:18;
}

/* NOISE */
.screen-noise{
  position:absolute;inset:0;
  opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events:none;z-index:17;
}

/* TITLE BAR */
.titlebar{
  height:34px;flex-shrink:0;
  background:var(--panel);
  border-bottom:1px solid var(--green3);
  display:flex;align-items:center;
  padding:0 1rem;
  position:relative;z-index:15;
}
.tb-dots{display:flex;gap:.45rem;margin-right:1rem;}
.tb-dot{width:11px;height:11px;border-radius:50%;cursor:pointer;transition:filter .2s;}
.tb-dot:hover{filter:brightness(1.3);}
.tb-dot.r{background:#FF5F56;box-shadow:0 0 6px #FF5F5688;}
.tb-dot.y{background:#FFBD2E;box-shadow:0 0 6px #FFBD2E88;}
.tb-dot.g{background:#27C93F;box-shadow:0 0 6px #27C93F88;}
.tb-title{
  font-family:var(--mono);font-size:.66rem;
  color:var(--dim);letter-spacing:.06em;
  position:absolute;left:50%;transform:translateX(-50%);
  white-space:nowrap;
}
.tb-title b{color:var(--muted);}
.tb-clock{
  margin-left:auto;
  font-family:var(--mono);font-size:.62rem;
  color:var(--dim);letter-spacing:.08em;
}

/* MAIN LAYOUT */
.main-wrap{
  flex:1;display:flex;overflow:hidden;
  position:relative;z-index:10;
}

/* SIDEBAR (desktop) */
.sidebar{
  width:190px;flex-shrink:0;
  background:var(--panel);
  border-right:1px solid var(--green3);
  display:flex;flex-direction:column;
  overflow-y:auto;
  padding:.75rem 0;
}
.sidebar::-webkit-scrollbar{width:2px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--green3);}
.sb-section-title{
  font-family:var(--mono);font-size:.52rem;
  letter-spacing:.2em;text-transform:uppercase;
  color:var(--green3);padding:.5rem 1rem .3rem;
  font-weight:500;
}
.sb-cmd{
  font-family:var(--mono);font-size:.66rem;
  color:var(--muted);
  padding:.42rem 1rem;
  cursor:pointer;
  display:flex;align-items:center;gap:.6rem;
  transition:background .12s,color .12s;
  position:relative;letter-spacing:.02em;
}
.sb-cmd::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:0;background:var(--green);transition:width .15s;
}
.sb-cmd:hover{background:rgba(0,255,65,.04);color:var(--green2);}
.sb-cmd.active{background:rgba(0,255,65,.07);color:var(--green);}
.sb-cmd.active::before{width:2px;}
.sb-cmd-icon{color:var(--green3);font-size:.6rem;}
.sb-footer{
  margin-top:auto;padding:1rem;
  border-top:1px solid var(--green3);
  font-family:var(--mono);font-size:.55rem;
  color:var(--green3);line-height:1.7;
}

/* TERMINAL AREA */
.term-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}

.terminal{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:1.25rem 1.5rem .5rem;
  scroll-behavior:smooth;
}
.terminal::-webkit-scrollbar{width:2px;}
.terminal::-webkit-scrollbar-track{background:transparent;}
.terminal::-webkit-scrollbar-thumb{background:var(--green3);}

/* MOBILE QUICKBAR */
.mobile-bar{
  display:none;
  flex-wrap:wrap;gap:.4rem;
  padding:.6rem 1rem;
  border-top:1px solid var(--green3);
  background:var(--panel);
  flex-shrink:0;
}
.mob-btn{
  font-family:var(--mono);font-size:.58rem;
  letter-spacing:.06em;
  padding:.3rem .7rem;
  border:1px solid var(--green3);
  color:var(--muted);
  background:transparent;
  cursor:pointer;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.mob-btn:active{background:rgba(0,255,65,.1);color:var(--green);border-color:var(--green);}

/* INPUT ROW */
.input-section{
  padding:.25rem 1.5rem .75rem;
  flex-shrink:0;
  position:relative;z-index:10;
}
.input-row{
  display:flex;align-items:center;gap:.5rem;
}
.prompt-badge{
  font-family:var(--mono);font-size:.74rem;
  font-weight:600;
  white-space:nowrap;flex-shrink:0;
}
.p-user{color:var(--amber);}
.p-at{color:var(--dim);}
.p-host{color:var(--blue);}
.p-sep{color:var(--dim);}
.p-dollar{color:var(--green);text-shadow:0 0 8px var(--green);}
.real-input{
  font-family:var(--mono);font-size:.74rem;
  background:transparent;border:none;outline:none;
  color:var(--white);flex:1;min-width:0;
  caret-color:var(--green);
}
.real-input::selection{background:rgba(0,255,65,.2);}

/* STATUS BAR */
.statusbar{
  height:22px;flex-shrink:0;
  background:var(--panel);
  border-top:1px solid var(--green3);
  display:flex;align-items:center;
  padding:0 1rem;gap:1.5rem;
  position:relative;z-index:15;
}
.stb{
  font-family:var(--mono);font-size:.54rem;
  color:var(--green3);letter-spacing:.07em;
  white-space:nowrap;
}
.stb.live{color:var(--green);animation:glow 3s ease infinite;}
@keyframes glow{0%,100%{text-shadow:none;}50%{text-shadow:0 0 8px var(--green);}}
.stb-right{margin-left:auto;}

/* LINES */
.line{
  font-family:var(--mono);font-size:.74rem;
  line-height:1.78;white-space:pre-wrap;
  word-break:break-word;
}
.prompt-echo{
  display:flex;gap:.5rem;
  font-family:var(--mono);font-size:.74rem;
  line-height:1.78;
}

/* COLORS */
.cg{color:var(--green);text-shadow:0 0 7px rgba(0,255,65,.5);}
.cg2{color:var(--green2);}
.ca{color:var(--amber);text-shadow:0 0 7px rgba(255,182,39,.4);}
.cb{color:var(--blue);}
.cr{color:var(--red);}
.cw{color:var(--white);}
.cm{color:var(--muted);}
.cd{color:var(--dim);}
.cdim{color:var(--green3);}
.bold{font-weight:700;}
.italic{font-style:italic;}

/* ASCII */
.ascii{
  font-family:var(--mono);font-size:.48rem;line-height:1.15;
  color:var(--green2);
  text-shadow:0 0 12px rgba(0,255,65,.35);
  white-space:pre;margin:.3rem 0;
}

/* CURSOR BLINK */
.cb-cur{
  display:inline-block;width:7px;height:13px;
  background:var(--green);
  box-shadow:0 0 6px var(--green);
  vertical-align:middle;margin-left:1px;
  animation:cblink .85s step-end infinite;
}
@keyframes cblink{0%,100%{opacity:1;}50%{opacity:0;}}

/* PROGRESS */
.prog-line{font-family:var(--mono);font-size:.7rem;line-height:1.78;}
.bar-filled{color:var(--green);text-shadow:0 0 4px rgba(0,255,65,.5);}
.bar-empty{color:var(--green3);}

/* DIVIDER */
.div-line{
  font-family:var(--mono);font-size:.7rem;
  color:var(--green3);line-height:1.78;
}

/* HELP GRID */
.help-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:.1rem 3rem;margin:.3rem 0;
}
.hg-row{display:flex;gap:1rem;font-family:var(--mono);font-size:.72rem;line-height:1.8;}
.hg-cmd{color:var(--green);min-width:110px;font-weight:600;text-shadow:0 0 5px rgba(0,255,65,.4);}
.hg-desc{color:var(--muted);}

/* SKILL BARS */
.skill-row{
  display:flex;align-items:center;gap:.75rem;
  font-family:var(--mono);font-size:.71rem;
  line-height:1.8;
}
.sk-name{color:var(--muted);min-width:115px;}
.sk-bar{letter-spacing:-1px;}
.sk-lvl{color:var(--green3);font-size:.6rem;}

/* TABLE */
.tbl-row{
  display:flex;gap:2rem;
  font-family:var(--mono);font-size:.7rem;
  line-height:1.85;
}
.tbl-k{color:var(--amber);min-width:130px;}
.tbl-v{color:var(--white);}

/* MOBILE */
@media(max-width:680px){
  .sidebar{display:none;}
  .mobile-bar{display:flex;}
  .terminal{padding:.85rem 1rem .5rem;}
  .input-section{padding:.25rem 1rem .6rem;}
  .line,.prompt-echo{font-size:.68rem;}
  .real-input{font-size:.68rem;}
  .prompt-badge{font-size:.68rem;}
  .ascii{font-size:.36rem;}
  .help-grid{grid-template-columns:1fr;}
  .skill-row{flex-wrap:wrap;gap:.4rem;}
  .tbl-k{min-width:100px;}
}
@media(max-width:400px){
  .line,.prompt-echo{font-size:.62rem;}
  .terminal{padding:.7rem .8rem .4rem;}
}
</style>
</head>
<body>

<div class="monitor">
<div class="screen">
  <div class="screen-glow"></div>
  <div class="screen-noise"></div>

  <!-- TITLE BAR -->
  <div class="titlebar">
    <div class="tb-dots">
      <div class="tb-dot r"></div>
      <div class="tb-dot y"></div>
      <div class="tb-dot g"></div>
    </div>

  <!-- MAIN -->
  <div class="main-wrap">

    <!-- SIDEBAR -->
    <div class="sidebar">

    <!-- TERMINAL -->

      <!-- MOBILE QUICK BUTTONS -->
      <div class="mobile-bar">

      </div>

      <!-- INPUT -->
      <div class="input-section">
        <div class="input-row" id="inputRow">
          <span class="prompt-badge">
            <span class="p-user">damaris</span><span class="p-at">@</span><span class="p-host">portfolio</span><span class="p-sep">:~</span><span class="p-dollar">$</span>
          </span>
          <input class="real-input" id="mainInput" autocomplete="off" spellcheck="false" autofocus placeholder="type a command..."/>
        </div>

  <!-- STATUS BAR -->
  <div class="statusbar">

    <div class="stb">UTF-8</div>
    <div class="stb stb-right" id="stbDate"></div>

</div>

<script>
const term = document.getElementById('term');
const mainInput = document.getElementById('mainInput');
let isRunning = false;
let cmdHistory = [];
let histIdx = -1;

// Clock
function updateClock(){
  const now = new Date();
  const t = now.toLocaleTimeString('en-US',{hour12:false});
  const d = now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  document.getElementById('tbClock').textContent = t;
  document.getElementById('stbDate').textContent = d + ' · ' + t;
}
updateClock(); setInterval(updateClock,1000);

// Helpers
const sleep = ms => new Promise(r=>setTimeout(r,ms));

function el(tag,cls,html){
  const d=document.createElement(tag);
  if(cls)d.className=cls;
  if(html!==undefined)d.innerHTML=html;
  return d;
}

function append(node){
  term.appendChild(node);
  term.scrollTop=term.scrollHeight;
  return node;
}

function line(html,cls='line'){
  return append(el('div',cls,html));
}

function blank(){ line('','line'); }

function div(html){ return append(el('div','div-line',html)); }

function promptEcho(cmd){
  const d=el('div','prompt-echo');
  d.innerHTML=`<span class="prompt-badge"><span class="p-user">damaris</span><span class="p-at">@</span><span class="p-host">portfolio</span><span class="p-sep">:~</span><span class="p-dollar">$</span></span><span class="cw">${cmd}</span>`;
  append(d);
}

async function progress(label,steps=20,ms=500){
  const d=append(el('div','prog-line'));
  for(let i=0;i<=steps;i++){
    const f=Math.round((i/steps)*24);
    const bar='<span class="bar-filled">'+'█'.repeat(f)+'</span><span class="bar-empty">'+'░'.repeat(24-f)+'</span>';
    const pct=Math.round((i/steps)*100);
    const col=pct===100?'cg':'cm';
    d.innerHTML=`<span class="cm">${label}</span>  ${bar}  <span class="${col}">${pct}%</span>`;
    await sleep(ms/steps);
  }
  d.innerHTML=`<span class="cm">${label}</span>  <span class="bar-filled">${'█'.repeat(24)}</span>  <span class="cg">100% ✓</span>`;
}

// Sidebar active
function setSidebarActive(cmd){
  document.querySelectorAll('.sb-cmd').forEach(el=>{
    el.classList.toggle('active', el.getAttribute('onclick')===`runCmd('${cmd}')`);
  });
}

// ASCII
const ASCII=`
  ██████╗  ██████╗
  ██╔══██╗██╔════╝
  ██║  ██║██║  ███╗
  ██║  ██║██║   ██║
  ██████╔╝╚██████╔╝
  ╚═════╝  ╚═════╝`;

// COMMANDS
const commands = {

  async help(){
    blank();
    line(`<span class="ca bold">COMMAND REFERENCE</span>  <span class="cdim">─────────────────────────────────────────</span>`);
    blank();
    const cmds=[
      ['whoami','who is damaris + overview'],
      ['skills','tech stack with proficiency'],
      ['experience','full work history'],
      ['projects','things built from scratch'],
      ['education','academic background'],
      ['stats','numbers at a glance'],
      ['status','what i am currently up to'],
      ['contact','how to reach me'],
      ['clear','clear the terminal'],
      ['help','show this message'],
    ];
    const grid=append(el('div','help-grid'));
    cmds.forEach(([c,d])=>{
      const row=el('div','hg-row');
      row.innerHTML=`<span class="hg-cmd">${c}</span><span class="hg-desc">${d}</span>`;
      grid.appendChild(row);
    });
    blank();
    line(`<span class="cdim">tip: click sidebar links or tap quick buttons on mobile</span>`);
    blank();
  },

  async whoami(){
    blank();
    line(`<pre class="ascii">${ASCII}</pre>`);
    blank();
    line(`<span class="cg bold" style="font-size:.82rem;letter-spacing:.04em;text-shadow:0 0 14px var(--green)">DAMARIS GOUMTSOP</span>`);
    line(`<span class="cdim">${'─'.repeat(50)}</span>`);
    blank();
    line(`<span class="ca">role        </span><span class="cw">Systems & Backend Engineer</span>`);
    line(`<span class="ca">school      </span><span class="cw">George Mason University — B.S. Computer Science</span>`);
    line(`<span class="ca">graduation  </span><span class="cw">May 2027</span>`);
    line(`<span class="ca">location    </span><span class="cw">Washington DC Metro Area</span>`);
    line(`<span class="ca">background  </span><span class="cw">Cameroonian-American</span>`);
    line(`<span class="ca">status      </span><span class="cg">● Open to internships · Summer 2026</span>`);
    blank();
    await sleep(250);
    line(`<span class="cdim italic">// philosophy</span>`);
    line(`<span class="cm">"I don't build features.</span>`);
    await sleep(300);
    line(`<span class="cg bold"> I build the infrastructure features run on."</span>`);
    blank();
    line(`<span class="cb">github    </span><span class="cm">→  github.com/dgoumtsop</span>`);
    line(`<span class="cb">linkedin  </span><span class="cm">→  linkedin.com/in/dgoumtsop</span>`);
    line(`<span class="cb">email     </span><span class="cm">→  dgoumtsop@gmail.com</span>`);
    blank();
  },

  async skills(){
    blank();
    line(`<span class="ca bold">TECH STACK</span>  <span class="cdim">───────────────────────────────────────────────</span>`);
    blank();

    const groups=[
      {label:'Languages', items:[
        ['Go','██████████████████████','expert','primary'],
        ['Java','████████████████████░░','advanced','strong'],
        ['Python','██████████████████░░░░','advanced',''],
        ['C','████████████████░░░░░░','proficient',''],
        ['TypeScript','██████████████░░░░░░░░','proficient',''],
        ['SQL','████████████████████░░','advanced',''],
      ]},
      {label:'Backend & Data', items:[
        ['Node.js','████████████████░░░░░░','proficient',''],
        ['PostgreSQL','████████████████████░░','advanced',''],
        ['Redis','██████████████████░░░░','advanced',''],
        ['BullMQ','██████████████░░░░░░░░','proficient',''],
        ['Spring Boot','████████████░░░░░░░░░░','proficient',''],
        ['REST APIs','████████████████████░░','advanced',''],
      ]},
      {label:'Infrastructure', items:[
        ['Docker','██████████████████████','expert',''],
        ['Prometheus','████████████████░░░░░░','advanced',''],
        ['k6','██████████████░░░░░░░░','proficient',''],
        ['Linux','████████████████████░░','advanced',''],
        ['WebSocket','████████████████░░░░░░','proficient',''],
        ['Git','████████████████████░░','advanced',''],
      ]},
    ];

    for(const g of groups){
      line(`<span class="cg">[ ${g.label} ]</span>`);

// History navigation
mainInput.addEventListener('keydown', async e=>{
  if(e.key==='ArrowUp'){
    e.preventDefault();
    if(histIdx<cmdHistory.length-1){ histIdx++; mainInput.value=cmdHistory[histIdx]||''; }
  } else if(e.key==='ArrowDown'){
    e.preventDefault();
    if(histIdx>0){ histIdx--; mainInput.value=cmdHistory[histIdx]||''; }
    else{ histIdx=-1; mainInput.value=''; }
  } else if(e.key==='Tab'){
    e.preventDefault();
    const partial=mainInput.value.trim().toLowerCase();
    const match=Object.keys(commands).find(c=>c.startsWith(partial));
    if(match) mainInput.value=match;
  }
});

async function runCmd(cmd){
  if(isRunning) return;
  const c = (cmd || mainInput.value.trim().toLowerCase());
  mainInput.value='';
  histIdx=-1;

  if(c) cmdHistory.unshift(c);

  promptEcho(c);
  document.getElementById('stbCmd').textContent = c||'bash';
  setSidebarActive(c);

  if(!c){ return; }
  isRunning=true;
  mainInput.disabled=true;

  if(commands[c]) await commands[c]();
  else await commands.unknown(c);

  mainInput.disabled=false;
  mainInput.focus();
  isRunning=false;
}

mainInput.addEventListener('keydown', async e=>{
  if(e.key==='Enter') runCmd();
});

document.addEventListener('click',()=>{ if(!isRunning && mainInput) mainInput.focus(); });
